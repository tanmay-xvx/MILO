# Note: do not add `--cfg portable_atomic_unsafe_assume_single_core` here —
# Cargo.toml enables portable-atomic's `critical-section` feature (impl
# provided by esp-hal), and portable-atomic refuses both at once.
[target.riscv32imc-unknown-none-elf]
rustflags = [
    "-C", "link-arg=-Tlinkall.x",
]

[target.thumbv6m-none-eabi]
rustflags = [
    "-C", "link-arg=--nmagic",
    "-C", "link-arg=-Tlink.x",
]
runner = "elf2uf2-rs -d"

[unstable]
build-std = ["core", "alloc"]
build-std-features = ["compiler-builtins-mem"]
