name: Build MILO Receiver

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.variant }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: esp32c3
            family: esp32
            target: riscv32imc-unknown-none-elf
            features: esp32c3
            artifact_ext: bin
            rust_toolchain: nightly
          - variant: rp2040
            family: rp2040
            target: thumbv6m-none-eabi
            features: rp2040
            artifact_ext: uf2
            rust_toolchain: nightly
          # Future boards (added as their HAL adapters land):
          # - variant: esp32s3
          #   family: esp32
          #   target: xtensa-esp32s3-none-elf
          #   features: esp32s3
          #   artifact_ext: bin

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust_toolchain }}
          targets: ${{ matrix.target }}
          components: rust-src

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: receiver

      - name: Install system deps (libudev for espflash / elf2uf2-rs)
        if: matrix.family == 'esp32' || matrix.family == 'rp2040'
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config

      - name: Install stable toolchain (for host tools like espflash)
        uses: dtolnay/rust-toolchain@stable

      - name: Install espflash (for ESP targets)
        if: matrix.family == 'esp32'
        run: |
          cargo +stable install espflash --locked --version 3.3.0

      - name: Build receiver
        working-directory: receiver
        run: |
          cargo +${{ matrix.rust_toolchain }} build \
            --release \
            --target ${{ matrix.target }} \
            --no-default-features \
            --features ${{ matrix.features }}

      - name: Package ESP .bin image
        if: matrix.family == 'esp32'
        working-directory: receiver
        run: |
          mkdir -p dist
          espflash save-image \
            --chip ${{ matrix.variant }} \
            target/${{ matrix.target }}/release/milo-receiver \
            dist/milo-receiver-${{ matrix.variant }}.${{ matrix.artifact_ext }}

      - name: Package RP2040 UF2
        if: matrix.family == 'rp2040'
        working-directory: receiver
        run: |
          mkdir -p dist
          cargo install elf2uf2-rs --locked || true
          elf2uf2-rs target/${{ matrix.target }}/release/milo-receiver \
            dist/milo-receiver-${{ matrix.variant }}.${{ matrix.artifact_ext }}

      - name: Record build metadata
        working-directory: receiver/dist
        run: |
          artifact="milo-receiver-${{ matrix.variant }}.${{ matrix.artifact_ext }}"
          sha256sum "$artifact" | awk '{print $1}' > "$artifact.sha256"
          stat -c%s "$artifact" > "$artifact.size"
          echo "{\"variant\":\"${{ matrix.variant }}\",\"family\":\"${{ matrix.family }}\",\"filename\":\"$artifact\",\"size_bytes\":$(cat $artifact.size),\"sha256\":\"$(cat $artifact.sha256)\"}" > "$artifact.meta.json"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: milo-receiver-${{ matrix.variant }}
          path: |
            receiver/dist/milo-receiver-${{ matrix.variant }}.${{ matrix.artifact_ext }}
            receiver/dist/milo-receiver-${{ matrix.variant }}.${{ matrix.artifact_ext }}.sha256
            receiver/dist/milo-receiver-${{ matrix.variant }}.${{ matrix.artifact_ext }}.meta.json

  host-tests:
    name: host pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Rust + wasm target (for compile / fleet / signing tests)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Build std receiver (enables fleet / MCP / signing e2e tests)
        working-directory: receiver
        run: cargo build
      - name: Install host deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest pyserial cryptography
      - name: Run tests
        working-directory: host
        run: python -m pytest tests/ -v
